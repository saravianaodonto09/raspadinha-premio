<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vale-Cafuné Virtual da Sara</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}
body{
    font-family:'Poppins',sans-serif;
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    padding:24px;
    background:
    linear-gradient(
        135deg,
        #cbb6ff 0%,
        #e6c8ff 50%,
        #ffd1dc 100%
    );
    overflow:hidden;
}
body::before{
    content:"";
    position:fixed;
    width:500px;
    height:500px;
    border-radius:50%;
    background:
    rgba(255,255,255,.25);
    filter:blur(80px);
    top:-150px;
    right:-100px;
}
body::after{
    content:"";
    position:fixed;
    width:350px;
    height:350px;
    border-radius:50%;
    background:
    rgba(255,255,255,.18);
    filter:blur(70px);
    bottom:-100px;
    left:-100px;
}
.card{
    position:relative;
    width:100%;
    max-width:420px;
    background:white;
    border-radius:32px;
    padding:28px;
    text-align:center;
    box-shadow:
    0 25px 60px rgba(76,40,130,.18);
    z-index:2;
}
.heart{
    font-size:42px;
    margin-bottom:12px;
}
h1{
    color:#6d4cc4;
    font-size:28px;
    margin-bottom:8px;
}
.subtitulo{
    color:#777;
    font-size:15px;
    line-height:1.5;
    margin-bottom:24px;
}
.scratch-container{
    position:relative;
    width:100%;
    height:260px;
    border-radius:24px;
    overflow:hidden;
}
.prize{
    position:absolute;
    inset:0;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    padding:22px;
    background:
    linear-gradient(
        135deg,
        #fff8fc,
        #ffe9f5
    );
}
.prize h2{
    color:#6d4cc4;
    margin-bottom:12px;
    font-size:28px;
}
.prize p{
    color:#555;
    line-height:1.5;
}
.casal{
    font-size:46px;
    margin:14px 0;
}
.ticket{
    margin-top:18px;
    background:
    linear-gradient(
        135deg,
        #ff79b0,
        #ff5f9f
    );
    color:white;
    padding:14px 30px;
    border-radius:18px;
    font-size:30px;
    font-weight:700;
    letter-spacing:4px;
    box-shadow:
    0 12px 25px rgba(255,95,159,.35);
}
canvas{
    position:absolute;
    inset:0;
    width:100%;
    height:100%;
}
.footer{
    margin-top:18px;
    color:#999;
    font-size:13px;
}
</style>
</head>
<body>
<div class="card">
<div class="heart">💜</div>
<h1>Raspadinha Especial</h1>
<div class="subtitulo">
    Raspe a área abaixo para descobrir sua surpresa ❤️
</div>
<div class="scratch-container">
    <div class="prize">
        <h2>
            ✨ Surpresa Desbloqueada ✨
        </h2>
        <p>
            Você recebeu um
        </p>
        <p style="
            font-size:26px;
            font-weight:700;
            color:#6d4cc4;
            margin-top:8px;
        ">
            Vale-Cafuné Virtual da Sara
        </p>
        <div class="casal">
            👩‍❤️‍👩
        </div>
        <p>
            Caso deseje converter para a versão presencial,
            apresente o cupom abaixo para resgate 💜
        </p>
        <div class="ticket">
            CAFUN3
        </div>
    </div>
    <canvas id="scratch"></canvas>
</div>
<div class="footer">
    Raspe aproximadamente metade da área ✨
</div>
</div>
</body>
</html>
